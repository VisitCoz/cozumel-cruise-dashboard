name: Daily Cruise Alert

on:
  schedule:
    # Every day at 7:00 PM Cozumel time (00:00 UTC next day)
    # Cozumel = UTC-5 year-round (Quintana Roo time)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send tomorrow's schedule to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: node notify-telegram.js --tomorrow

      - name: Send weekly summary on Sundays
        if: ${{ github.event.schedule == '0 0 * * *' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "1" ]; then
            node notify-telegram.js --week
          fi
